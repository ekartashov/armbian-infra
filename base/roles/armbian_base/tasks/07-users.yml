---
# roles/armbian_base/tasks/07-users.yml

- name: Create admin user and clean up image defaults
  ansible.builtin.shell: |
    {{ role_path }}/scripts/create-user.sh \
      --staging '{{ staging_root }}' \
      --user '{{ admin_user }}' \
      --shell '{{ admin_shell }}' \
      --groups '{{ admin_groups | join(",") }}' \
      --pubkey '{{ admin_ssh_pubkey }}' \
      <<< '{{ admin_password_hash }}'
  args:
    executable: /bin/bash
  no_log: true

- name: Disable armbian-firstrun service
  ansible.builtin.file:
    path: "{{ staging_root }}/etc/systemd/system/multi-user.target.wants/armbian-firstrun.service"
    state: absent

- name: Remove first-login wizard trigger
  ansible.builtin.file:
    path: "{{ staging_root }}/root/.not_logged_in_yet"
    state: absent

- name: Regenerate SSH host keys
  ansible.builtin.shell: |
    set -euo pipefail
    rm -f {{ staging_root }}/etc/ssh/ssh_host_*
    # Generate new keys via chroot so they match the target system's openssh
    chroot {{ staging_root }} dpkg-reconfigure openssh-server 2>/dev/null || {
      # Fallback: generate directly if dpkg-reconfigure isn't available
      for type in rsa ecdsa ed25519; do
        ssh-keygen -t $type -f {{ staging_root }}/etc/ssh/ssh_host_${type}_key -N "" -q
      done
    }
  args:
    executable: /bin/bash
  changed_when: true

- name: Prevent firstrun from re-randomizing MAC
  ansible.builtin.copy:
    content: "OPENSSHD_REGENERATE_HOST_KEYS=false\n"
    dest: "{{ staging_root }}/etc/default/armbian-firstrun"
    mode: "0644"

- name: Deploy sshd_config (key-only, no root login)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../templates/sshd_config"
    dest: "{{ staging_root }}/etc/ssh/sshd_config"
    mode: "0644"

- name: Enable SSH service on installed system
  ansible.builtin.shell: |
    set -euo pipefail
    root="{{ staging_root }}"
    mkdir -p "${root}/etc/systemd/system/multi-user.target.wants"
    if [[ -f "${root}/lib/systemd/system/ssh.service" ]]; then
      ln -sf /lib/systemd/system/ssh.service \
        "${root}/etc/systemd/system/multi-user.target.wants/ssh.service"
    elif [[ -f "${root}/lib/systemd/system/sshd.service" ]]; then
      ln -sf /lib/systemd/system/sshd.service \
        "${root}/etc/systemd/system/multi-user.target.wants/sshd.service"
    fi
    # Remove socket activation (we want the daemon directly)
    rm -f "${root}/etc/systemd/system/sockets.target.wants/ssh.socket" 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: true

- name: Configure passwordless sudo for admin
  ansible.builtin.copy:
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "{{ staging_root }}/etc/sudoers.d/90-admin"
    mode: "0440"
