---
# roles/armbian_base/tasks/09-finalize.yml

- name: Clean apt cache in target
  ansible.builtin.shell: |
    chroot {{ staging_root }} apt-get clean 2>/dev/null || true
    rm -rf {{ staging_root }}/var/lib/apt/lists/* 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: true

- name: Update initramfs (ensure btrfs modules are included)
  ansible.builtin.shell: |
    set -euo pipefail

    cleanup_chroot() {
      umount {{ staging_root }}/var/tmp 2>/dev/null || true
      umount {{ staging_root }}/dev     2>/dev/null || true
      umount {{ staging_root }}/sys     2>/dev/null || true
      umount {{ staging_root }}/proc    2>/dev/null || true
      [[ -n "${tmpdir:-}" ]] && rmdir "$tmpdir" 2>/dev/null || true
    }
    trap cleanup_chroot EXIT

    # Ensure essential device nodes exist in the staging root
    [[ -c {{ staging_root }}/dev/console ]] || mknod -m 622 {{ staging_root }}/dev/console c 5 1
    [[ -c {{ staging_root }}/dev/null ]]    || mknod -m 666 {{ staging_root }}/dev/null    c 1 3

    # Bind mounts needed for chroot initramfs generation
    mount --bind /proc {{ staging_root }}/proc
    mount --bind /sys  {{ staging_root }}/sys
    mount --bind /dev  {{ staging_root }}/dev
    # /var/tmp needs space for mkinitramfs scratch
    tmpdir=$(mktemp -d)
    mount --bind "$tmpdir" {{ staging_root }}/var/tmp

    # Ensure btrfs kernel module is listed for inclusion in the initramfs
    grep -qxF 'btrfs' {{ staging_root }}/etc/initramfs-tools/modules \
      || echo 'btrfs' >> {{ staging_root }}/etc/initramfs-tools/modules

    chroot {{ staging_root }} update-initramfs -u -v 2>&1

    # Verify the initramfs was actually generated
    if ! ls {{ staging_root }}/boot/initrd.img-* >/dev/null 2>&1; then
      echo "ERROR: no initramfs found after update-initramfs" >&2
      exit 1
    fi
  args:
    executable: /bin/bash
  changed_when: true

- name: Verify armbianEnv.txt configuration
  ansible.builtin.script:
    cmd: "scripts/verify-armbianenv.sh {{ staging_root }}/boot/armbianEnv.txt {{ board_mac }}"
  changed_when: false

- name: Take golden image snapshot
  ansible.builtin.shell: |
    set -euo pipefail
    snap_path="{{ btrbk_toplevel_mount }}/@snapshots/root.golden"
    if btrfs subvolume show "$snap_path" >/dev/null 2>&1; then
      echo "golden snapshot already exists — skipping"
    else
      btrfs subvolume snapshot -r \
        "{{ btrbk_toplevel_mount }}/@" \
        "$snap_path"
      echo "golden snapshot created"
    fi
  args:
    executable: /bin/bash
  when: enable_golden_snapshot | bool
  register: _golden
  changed_when: "'created' in _golden.stdout"

- name: Unmount all staging mounts
  ansible.builtin.shell: |
    set -euo pipefail
    # Unmount subvolumes in reverse depth order
    for mp in $(findmnt -R -n -o TARGET {{ staging_root }} | sort -r); do
      umount "$mp" 2>/dev/null || true
    done
    # Unmount toplevel
    umount {{ btrbk_toplevel_mount }} 2>/dev/null || true
    echo "unmounted"
  args:
    executable: /bin/bash
  changed_when: true

- name: Verify boot readiness of installed system
  ansible.builtin.script:
    cmd: >-
      scripts/verify-boot-readiness.sh
      --root-uuid {{ root_uuid }}
      --mount-options {{ btrfs_mount_options }}
  changed_when: false

- name: Display completion summary
  ansible.builtin.debug:
    msg: |
      ═══ Provisioning Complete ═══
      Hostname:    {{ target_hostname }}
      MAC:         {{ board_mac }}
      Boot UUID:   {{ boot_uuid }}
      Root UUID:   {{ root_uuid }}
      Method:      {{ install_method }}

      Next: remove the SD card and reboot. The board will boot from NVMe as {{ target_hostname }}.
      SSH: ssh {{ admin_user }}@{{ target_hostname }}
