---
# base/playbooks/provision-base.yml
# Provisions an Orange Pi from armbian-bootstrap (SD overlay) to armbian-base (NVMe btrfs).
#
# Usage:
#   # Single host by IP (typical — board discovered via ARP/DHCP):
#   ansible-playbook -i "10.42.0.5," -u admin \
#     --private-key ../secrets/ssh/id_ed25519 \
#     playbooks/provision-base.yml \
#     --extra-vars "sbc_model=opi5"
#
#   # With explicit password hash:
#   ansible-playbook -i "10.42.0.5," -u admin \
#     --private-key ../secrets/ssh/id_ed25519 \
#     playbooks/provision-base.yml \
#     --extra-vars "sbc_model=opi5 admin_password_hash='\$6\$...'"
#
#   # Multiple boards (sequentially — same password for all):
#   ansible-playbook -i "10.42.0.5,10.42.0.6," -u admin \
#     --private-key ../secrets/ssh/id_ed25519 \
#     playbooks/provision-base.yml \
#     --extra-vars "sbc_model=opi5"

- name: Provision armbian-base on Orange Pi
  hosts: all
  become: true
  gather_facts: true
  # serial: 1 ensures boards are provisioned one at a time even when multiple
  # IPs are passed via the inventory string.  This is the primary defence
  # against shared-state races (hostname allocation, /tmp paths in
  # install-image.sh, etc.).  The hostname allocator also uses flock(1) as a
  # second layer of protection, but sequential execution is the safest default.
  # Do not remove serial: 1 without auditing every shared-state concern first.
  serial: 1

  pre_tasks:
    # ── Resolve admin password hash ──────────────────────────────────────
    # Resolution cascade (first match wins):
    #   1. --extra-vars "admin_password_hash='$6$...'"  (highest priority — explicit override)
    #   2. secrets/password.hash on the controller      (auto-read; shared across ALL boards)
    #   3. Interactive prompt → SHA-512 hash → saved to secrets/password.hash for future runs
    #
    # The hash is per-project: one file, same password for every board provisioned from this
    # controller.  It is NOT per-host and NOT per-user.  Deleting secrets/password.hash
    # (or running scripts/clean.sh --secrets) resets it.
    - name: Try reading password hash from secrets file
      ansible.builtin.set_fact:
        _secrets_password_hash: "{{ lookup('file', playbook_dir + '/../../secrets/password.hash', errors='ignore') | default('') }}"
      run_once: true
      delegate_to: localhost
      become: false
      no_log: true
      when: (admin_password_hash | default('')) == ""

    - name: Use secrets file hash if available
      ansible.builtin.set_fact:
        admin_password_hash: "{{ _secrets_password_hash }}"
      run_once: true
      no_log: true
      when:
        - (admin_password_hash | default('')) == ""
        - _secrets_password_hash | default('') != ""

    - name: Prompt for admin password if no hash available
      ansible.builtin.pause:
        prompt: "Enter admin password for installed system (all hosts)"
        echo: false
      register: _password_prompt
      run_once: true
      delegate_to: localhost
      become: false
      no_log: true
      when: (admin_password_hash | default('')) == ""

    - name: Hash the prompted password
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/gen-password-hash.sh"
          - "--stdout"
        stdin: "{{ _password_prompt.user_input }}"
      register: _hashed
      run_once: true
      delegate_to: localhost
      become: false
      no_log: true
      when:
        - (admin_password_hash | default('')) == ""
        - _password_prompt is defined
        - _password_prompt.user_input | default('') != ""
      changed_when: false

    - name: Set password hash from prompt
      ansible.builtin.set_fact:
        admin_password_hash: "{{ _hashed.stdout }}"
      run_once: true
      no_log: true
      when:
        - (admin_password_hash | default('')) == ""
        - _hashed is defined
        - _hashed.stdout | default('') != ""

    - name: Save prompted password hash to secrets/password.hash for future runs
      # Only runs when the hash was generated interactively: _hashed.stdout is only
      # populated when the "Hash the prompted password" task ran (not skipped).
      # If the hash came from extra-vars or the secrets file, that task is skipped and
      # _hashed.stdout is undefined, so this task is also skipped — no spurious writes.
      ansible.builtin.copy:
        content: "{{ admin_password_hash }}\n"
        dest: "{{ playbook_dir }}/../../secrets/password.hash"
        mode: "0600"
      run_once: true
      delegate_to: localhost
      become: false
      no_log: true
      when:
        - _hashed is defined
        - _hashed.stdout | default('') != ""

    - name: Fail if no password hash resolved
      ansible.builtin.fail:
        msg: >-
          No admin password hash available. Options:
          (a) run scripts/gen-password-hash.sh (writes secrets/password.hash, auto-read next run)
          (b) pass via --extra-vars "admin_password_hash='$6$...'"
      when: (admin_password_hash | default('')) == ""

    # ── Resolve SSH public key ───────────────────────────────────────────
    - name: Try reading SSH pubkey from secrets file
      ansible.builtin.set_fact:
        admin_ssh_pubkey: "{{ lookup('file', playbook_dir + '/../../secrets/ssh/id_ed25519.pub', errors='ignore') | default('') }}"
      run_once: true
      delegate_to: localhost
      become: false
      when: (admin_ssh_pubkey | default('')) == ""

    # ── Resolve image source for pull method ─────────────────────────────
    - name: Check for local base image on controller
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../images/{{ sbc_model | regex_replace('^opi5p$', 'orangepi5-plus') | regex_replace('^opi5$', 'orangepi5') }}"
      register: _local_image_dir
      delegate_to: localhost
      become: false
      run_once: true
      when: install_method == "pull"

  roles:
    - armbian_base
